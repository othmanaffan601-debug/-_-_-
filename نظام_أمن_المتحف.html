<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أمن المتحف - النسخة الإبداعية</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts: Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            /* Animated Mesh Gradient Background */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #1e293b;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        
        /* تأثيرات الإدخال داخل الزجاج */
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.95);
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.3);
        }

        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
        }
        
        .table-row-hover:hover { background-color: rgba(255, 255, 255, 0.6); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.8); }

        .toast { animation: slideIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* تأثيرات العناوين */
        .title-glow {
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body class="pb-16 text-slate-800">

    <!-- شريط العناوين العُلوي الزجاجي -->
    <header class="glass-panel text-white sticky top-0 z-40 border-b-0 border-white/20" style="background: rgba(15, 23, 42, 0.6);">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl md:text-3xl font-black flex items-center gap-3 title-glow tracking-wide text-white">
                <i class="fa-solid fa-shield-cat text-indigo-400 text-3xl"></i>
                نظام أمن المتحف
                <span class="text-xs bg-indigo-500/30 border border-indigo-400/50 text-indigo-200 px-3 py-1 rounded-full font-medium ml-2 shadow-[0_0_10px_rgba(99,102,241,0.5)]">الإصدار الإبداعي</span>
            </h1>
            <div class="flex items-center gap-4">
                <button onclick="resetData()" class="text-xs text-rose-300 hover:text-rose-100 transition bg-rose-500/20 px-3 py-1.5 rounded-lg border border-rose-500/30">
                    <i class="fa-solid fa-rotate-right"></i> مسح البيانات
                </button>
                <div id="liveClock" class="text-sm bg-white/10 px-5 py-2.5 rounded-xl border border-white/20 font-bold flex items-center gap-2 tracking-wide text-white shadow-inner">
                    <i class="fa-regular fa-clock text-indigo-300"></i> <span></span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-8 grid grid-cols-1 xl:grid-cols-12 gap-6">
        
        <!-- العمود الأيمن: الإعدادات والقيادة -->
        <div class="xl:col-span-4 space-y-6">
            
            <!-- ملخص الإحصائيات -->
            <div class="glass-panel p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute -right-10 -top-10 w-32 h-32 bg-indigo-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 group-hover:opacity-40 transition duration-500"></div>
                <h2 class="text-xl font-black mb-5 text-indigo-900 flex items-center gap-2">
                    <i class="fa-solid fa-chart-pie text-indigo-600"></i> ملخص القوة
                </h2>
                <div class="grid grid-cols-2 gap-4 text-center relative z-10">
                    <div class="glass-input p-4 rounded-2xl">
                        <p class="text-xs text-indigo-700 font-bold mb-1">إجمالي الفصيل</p>
                        <p id="statTotal" class="text-3xl font-black text-indigo-950">0</p>
                    </div>
                    <div class="glass-input p-4 rounded-2xl bg-rose-50/50 border-rose-200">
                        <p class="text-xs text-rose-700 font-bold mb-1">إجازة / غياب</p>
                        <p id="statLeaves" class="text-3xl font-black text-rose-950">0</p>
                    </div>
                    <div class="glass-input p-4 rounded-2xl col-span-2 bg-emerald-50/50 border-emerald-200">
                        <p class="text-sm text-emerald-800 font-bold mb-1">المداومين فعلياً</p>
                        <p id="statActive" class="text-5xl font-black text-emerald-950 drop-shadow-md">0</p>
                    </div>
                </div>
            </div>

            <!-- القيادة والمناصب -->
            <div class="glass-panel p-6 rounded-3xl relative overflow-hidden">
                <div class="absolute -left-10 -bottom-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20"></div>
                <h2 class="text-xl font-black mb-5 text-blue-900 flex items-center gap-2 border-b border-white/50 pb-3 relative z-10">
                    <i class="fa-solid fa-sitemap text-blue-600"></i> الهيكل الإداري
                </h2>
                
                <div class="space-y-4 relative z-10">
                    <!-- الفصيل -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">اسم/رقم الفصيل:</label>
                        <input type="text" id="platoonInput" onchange="updateLeadership()" placeholder="مثال: الفصيل الأول" class="glass-input w-full p-3 rounded-xl text-sm text-slate-800 font-bold shadow-sm">
                    </div>
                    <!-- الضابط المناوب -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">الضابط المناوب:</label>
                        <input type="text" id="dutyOfficerInput" onchange="updateLeadership()" placeholder="رتبة واسم الضابط" class="glass-input w-full p-3 rounded-xl text-sm text-slate-800 font-bold shadow-sm">
                    </div>
                    <!-- رئيس النوبة -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">مسؤول الدوام (رئيس النوبة):</label>
                        <select id="leaderSelect" onchange="updateLeadership()" class="glass-input w-full p-3 rounded-xl text-sm text-slate-800 font-bold shadow-sm cursor-pointer">
                            <option value="">-- اختر المسؤول من القوة --</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- إدارة المواقع -->
            <div class="glass-panel p-6 rounded-3xl">
                <h2 class="text-xl font-black mb-5 text-teal-900 flex items-center gap-2 border-b border-white/50 pb-3">
                    <i class="fa-solid fa-map-location-dot text-teal-600"></i> إدارة المواقع
                </h2>
                
                <div class="flex gap-2 mb-4">
                    <input type="text" id="locInput" placeholder="اسم الموقع الجديد" class="glass-input w-full p-3 rounded-xl text-sm shadow-sm">
                    <button onclick="addLocation()" class="btn-hover bg-teal-600 text-white px-5 py-3 rounded-xl text-sm font-bold shadow-lg shadow-teal-500/30">
                        إضافة
                    </button>
                </div>
                
                <div class="bg-white/40 rounded-xl border border-white/50 p-2 max-h-48 overflow-y-auto">
                    <ul id="locationsList" class="space-y-1">
                        <!-- سيتم تعبئة المواقع هنا -->
                    </ul>
                </div>
            </div>
            
            <!-- إضافة موظف -->
            <div class="glass-panel p-6 rounded-3xl">
                <h2 class="text-xl font-black mb-4 text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-user-plus text-slate-600"></i> تسجيل موظف جديد
                </h2>
                <div class="space-y-3 bg-white/30 p-4 rounded-2xl border border-white/50">
                    <input type="text" id="empInput" placeholder="الاسم الثلاثي" class="glass-input w-full p-3 rounded-xl text-sm shadow-sm font-bold">
                    <div>
                        <label class="block text-xs text-slate-600 font-bold mb-1 ml-1"><i class="fa-solid fa-calendar-day"></i> تاريخ بدء دورته (نظام 6/4):</label>
                        <input type="date" id="empDate" class="glass-input w-full p-3 rounded-xl text-sm shadow-sm text-slate-700">
                    </div>
                    <button onclick="addEmployee()" class="btn-hover w-full bg-slate-800 text-white font-bold py-3 px-4 rounded-xl text-sm shadow-xl shadow-slate-900/20">
                        إضافة للقوة
                    </button>
                </div>
            </div>
        </div>

        <!-- العمود الأيسر والأوسط: الجدول والبلاغ -->
        <div class="xl:col-span-8 space-y-6">
            
            <!-- جدول الموظفين -->
            <div class="glass-panel p-6 rounded-3xl flex flex-col min-h-[500px]">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-white/50 pb-4 gap-4">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                        <i class="fa-solid fa-users-viewfinder text-indigo-600 text-3xl drop-shadow-md"></i> 
                        دفتر تحضير وتوزيع القوة
                    </h2>
                    <span class="text-xs bg-indigo-100/80 text-indigo-800 px-4 py-2 rounded-xl font-bold border border-indigo-200 shadow-sm flex items-center gap-2">
                        <i class="fa-solid fa-robot text-indigo-500"></i> نظام 6/4 يُحسب آلياً
                    </span>
                </div>
                
                <div class="overflow-x-auto flex-grow bg-white/40 rounded-2xl border border-white/60 shadow-inner p-1">
                    <table class="w-full text-right border-collapse whitespace-nowrap">
                        <thead>
                            <tr class="text-slate-700 text-sm border-b border-white/60 bg-white/50">
                                <th class="p-4 font-black rounded-tr-xl">اسم الموظف</th>
                                <th class="p-4 font-black text-center">حالة الدورة (آلي)</th>
                                <th class="p-4 font-black">الموقع المستلم / الحالة الحالية</th>
                                <th class="p-4 font-black text-center rounded-tl-xl">إجراء</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody" class="text-sm divide-y divide-white/40">
                            <!-- سيتم تعبئة الجدول برمجياً -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- البلاغ اليومي النهائي -->
            <div class="glass-panel p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute -right-20 -bottom-20 w-64 h-64 bg-indigo-600 rounded-full mix-blend-overlay filter blur-3xl opacity-20 group-hover:opacity-40 transition duration-700"></div>
                
                <h2 class="text-2xl font-black mb-5 text-indigo-900 flex items-center gap-3 relative z-10">
                    <i class="fa-solid fa-file-signature text-indigo-600 text-3xl drop-shadow-md"></i> 
                    دفتر الأحداث والبلاغ اليومي
                </h2>
                <div class="space-y-5 relative z-10">
                    <textarea id="dailyNotes" rows="4" placeholder="اكتب هنا الملاحظات، الزيارات الرسمية، أو أي أحداث أمنية طارئة..." class="glass-input w-full p-5 rounded-2xl text-base shadow-inner resize-y text-slate-800 font-medium placeholder-slate-400"></textarea>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2">
                        <!-- طباعة / تصدير التقرير -->
                        <button onclick="generateReport()" class="btn-hover bg-gradient-to-r from-slate-800 to-slate-700 text-white font-bold py-4 px-6 rounded-2xl shadow-xl shadow-slate-900/30 flex justify-center items-center gap-3 text-lg">
                            <i class="fa-solid fa-print text-xl text-slate-300"></i> طباعة التقرير
                        </button>
                        
                        <!-- إرسال عبر الواتساب -->
                        <button onclick="sendViaWhatsApp()" class="btn-hover bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-bold py-4 px-6 rounded-2xl shadow-xl shadow-emerald-600/30 flex justify-center items-center gap-3 text-lg">
                            <i class="fa-brands fa-whatsapp text-2xl drop-shadow-md"></i> إرسال عبر واتساب
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- منطقة الإشعارات (Toasts) -->
    <div id="toastContainer" class="fixed bottom-6 left-6 z-50 flex flex-col gap-3"></div>

    <!-- قسم الطباعة (مخفي بالشاشة العادية) -->
    <div id="printSection" class="hidden fixed inset-0 bg-white text-black z-50 overflow-y-auto"></div>

    <script>
        // === 1. إعدادات البيانات ===
        const STORAGE_KEY = 'museumSecuritySystemData_v3';
        
        let defaultData = {
            platoonName: "الفصيل الأول",
            dutyOfficer: "",
            currentLeader: "",
            locations: ["البوابة الرئيسية", "قاعة العرض الكبرى", "غرفة المراقبة (CCTV)", "المعرض الخارجي", "بوابة كبار الشخصيات (VIP)"],
            employees: [
                { id: 1, name: "أحمد الشمري", cycleStartDate: getPastDate(2), status: "البوابة الرئيسية" },
                { id: 2, name: "خالد العتيبي", cycleStartDate: getPastDate(1), status: "غرفة المراقبة (CCTV)" },
                { id: 3, name: "سلطان المري", cycleStartDate: getPastDate(7), status: "إجازة" },
                { id: 4, name: "فهد الدوسري", cycleStartDate: getPastDate(0), status: "قاعة العرض الكبرى" },
                { id: 5, name: "سعود القحطاني", cycleStartDate: getPastDate(8), status: "إجازة" },
                { id: 6, name: "محمد المطيري", cycleStartDate: getPastDate(4), status: "البوابة الرئيسية" }
            ],
            dailyNotes: ""
        };

        let appData = loadData();

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try { return JSON.parse(saved); } catch(e) { console.error("Error loading data"); }
            }
            return JSON.parse(JSON.stringify(defaultData)); 
        }

        function saveData() {
            appData.dailyNotes = document.getElementById('dailyNotes').value;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        }

        function resetData() {
            if(confirm("هل أنت متأكد من مسح كافة البيانات والعودة للصفر؟")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function getPastDate(daysAgo) {
            const d = new Date();
            d.setDate(d.getDate() - daysAgo);
            return d.toISOString().split('T')[0];
        }

        // === 2. نظام حساب الدورة (6 دوام / 4 إجازة) ===
        function calculateShift(startDateStr) {
            if (!startDateStr) return { isWorking: true, text: "غير محدد", color: "text-slate-500", bg: "bg-slate-200/50" };
            
            const start = new Date(startDateStr);
            start.setHours(0,0,0,0);
            const now = new Date();
            now.setHours(0,0,0,0);
            
            const diffTime = now - start;
            let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return { isWorking: false, text: "لم يبدأ بعد", color: "text-slate-500", bg: "bg-slate-200/50" };

            let cycleDay = diffDays % 10; 
            
            if (cycleDay < 6) {
                return { isWorking: true, text: `يوم عمل (${cycleDay + 1}/6)`, color: "text-indigo-800", bg: "bg-indigo-200/70", icon: "fa-shield-halved" };
            } else {
                return { isWorking: false, text: `إجازة (${cycleDay - 5}/4)`, color: "text-rose-800", bg: "bg-rose-200/70", icon: "fa-mug-hot" };
            }
        }

        function autoUpdateStatuses() {
            appData.employees.forEach(emp => {
                const shiftInfo = calculateShift(emp.cycleStartDate);
                if (!shiftInfo.isWorking && emp.status !== "غياب") {
                    emp.status = "إجازة";
                } else if (shiftInfo.isWorking && (emp.status === "إجازة" || emp.status === "غير معين")) {
                    emp.status = "غير معين";
                }
            });
            saveData();
        }

        // === 3. الواجهة والتحديث ===
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            document.querySelector('#liveClock span').innerText = now.toLocaleDateString('ar-SA', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderSystem() {
            // تعبئة البيانات في الحقول
            document.getElementById('dailyNotes').value = appData.dailyNotes || "";
            document.getElementById('platoonInput').value = appData.platoonName || "";
            document.getElementById('dutyOfficerInput').value = appData.dutyOfficer || "";

            // 1. مسؤول الدوام
            const leaderSelect = document.getElementById('leaderSelect');
            leaderSelect.innerHTML = '<option value="">-- اختر المسؤول من القوة --</option>';
            appData.employees.forEach(emp => {
                const shiftInfo = calculateShift(emp.cycleStartDate);
                const selected = appData.currentLeader === emp.name ? "selected" : "";
                leaderSelect.innerHTML += `<option value="${emp.name}" ${selected}>${emp.name} ${!shiftInfo.isWorking ? '(إجازة)' : ''}</option>`;
            });

            // 2. قائمة المواقع للإدارة
            const locList = document.getElementById('locationsList');
            locList.innerHTML = '';
            appData.locations.forEach(loc => {
                locList.innerHTML += `
                    <li class="flex justify-between items-center bg-white/60 p-2 rounded-lg text-sm font-bold text-slate-700 shadow-sm border border-white/50">
                        <span><i class="fa-solid fa-location-dot text-teal-500 ml-2"></i>${loc}</span>
                        <button onclick="deleteLocation('${loc}')" class="text-rose-500 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 p-1.5 rounded-md transition" title="حذف الموقع">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </li>
                `;
            });

            // 3. جدول الموظفين
            const tbody = document.getElementById('employeeTableBody');
            tbody.innerHTML = '';
            
            let total = appData.employees.length;
            let leaves = 0;

            appData.employees.forEach(emp => {
                if(emp.status === "إجازة" || emp.status === "غياب") leaves++;

                const shiftInfo = calculateShift(emp.cycleStartDate);

                let statusOptions = `
                    <option value="غير معين" ${emp.status==='غير معين'?'selected':''}>⏳ متواجد (بانتظار التوزيع)</option>
                    <option value="إجازة" ${emp.status==='إجازة'?'selected':''}>🌴 إجازة مستحقة</option>
                    <option value="غياب" ${emp.status==='غياب'?'selected':''}>🚨 غياب / استئذان</option>
                    <optgroup label="المواقع ونقاط الحراسة">
                `;
                appData.locations.forEach(loc => {
                    statusOptions += `<option value="${loc}" ${emp.status===loc?'selected':''}>📍 ${loc}</option>`;
                });
                statusOptions += `</optgroup>`;

                let trClass = "table-row-hover transition duration-200 border-b border-white/30 ";
                if(emp.status === "إجازة") trClass += "bg-rose-50/40";
                if(emp.status === "غياب") trClass += "bg-red-100/50";
                if(emp.status === "غير معين" && shiftInfo.isWorking) trClass += "bg-amber-100/50";

                tbody.innerHTML += `
                    <tr class="${trClass}">
                        <td class="p-4 font-black text-slate-800 flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center text-indigo-600 text-sm shadow-inner">
                                <i class="fa-solid fa-user-shield"></i>
                            </div>
                            ${emp.name}
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-4 py-1.5 rounded-full text-xs font-black ${shiftInfo.bg} ${shiftInfo.color} flex items-center justify-center gap-2 w-fit mx-auto shadow-sm border border-white/50">
                                ${shiftInfo.icon ? `<i class="fa-solid ${shiftInfo.icon}"></i>` : ''} ${shiftInfo.text}
                            </span>
                        </td>
                        <td class="p-4">
                            <select onchange="changeStatus(${emp.id}, this.value)" class="glass-input p-2.5 rounded-xl text-sm font-bold w-full max-w-xs cursor-pointer">
                                ${statusOptions}
                            </select>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="deleteEmployee(${emp.id})" title="إزالة من القوة" class="w-9 h-9 rounded-xl bg-white/50 border border-rose-200 text-rose-500 hover:bg-rose-500 hover:text-white transition shadow-sm">
                                <i class="fa-solid fa-user-minus"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            // 4. الإحصائيات
            document.getElementById('statTotal').innerText = total;
            document.getElementById('statLeaves').innerText = leaves;
            document.getElementById('statActive').innerText = total - leaves;
        }

        // === 4. إجراءات الإدارة ===
        function updateLeadership() {
            appData.platoonName = document.getElementById('platoonInput').value;
            appData.dutyOfficer = document.getElementById('dutyOfficerInput').value;
            appData.currentLeader = document.getElementById('leaderSelect').value;
            saveData();
        }

        // إدارة المواقع
        function addLocation() {
            const val = document.getElementById('locInput').value.trim();
            if(val && !appData.locations.includes(val)) {
                appData.locations.push(val);
                document.getElementById('locInput').value = '';
                saveData();
                renderSystem();
                showToast('تمت إضافة الموقع بنجاح!', 'success');
            }
        }

        function deleteLocation(locName) {
            if(confirm(`هل أنت متأكد من حذف موقع "${locName}"؟ سيتم تحويل من فيه إلى "غير معين".`)) {
                appData.locations = appData.locations.filter(l => l !== locName);
                // إعادة تعيين الموظفين في هذا الموقع
                appData.employees.forEach(emp => {
                    if(emp.status === locName) {
                        emp.status = "غير معين";
                    }
                });
                saveData();
                renderSystem();
                showToast('تم حذف الموقع وتحديث التوزيع', 'info');
            }
        }

        // إدارة الموظفين
        function addEmployee() {
            const name = document.getElementById('empInput').value.trim();
            let date = document.getElementById('empDate').value;
            
            if(!name) { showToast('يرجى كتابة اسم الموظف', 'error'); return; }
            if(!date) { date = new Date().toISOString().split('T')[0]; }

            appData.employees.push({ id: Date.now(), name: name, cycleStartDate: date, status: "غير معين" });
            document.getElementById('empInput').value = '';
            document.getElementById('empDate').value = '';
            
            autoUpdateStatuses(); 
            saveData();
            renderSystem();
            showToast(`تمت إضافة ${name} للقوة!`, 'success');
        }

        function deleteEmployee(id) {
            if(confirm('هل تريد فعلاً حذف هذا الموظف نهائياً؟')) {
                appData.employees = appData.employees.filter(e => e.id !== id);
                appData.currentLeader = appData.employees.some(e=>e.name === appData.currentLeader) ? appData.currentLeader : "";
                saveData();
                renderSystem();
                showToast('تم حذف الموظف', 'info');
            }
        }

        function changeStatus(id, newStatus) {
            const emp = appData.employees.find(e => e.id === id);
            if(emp) {
                emp.status = newStatus;
                saveData();
                renderSystem();
            }
        }

        document.getElementById('dailyNotes').addEventListener('input', saveData);

        // === 5. التنبيهات (Toasts) ===
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let bg = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-rose-600' : 'bg-slate-800';
            let icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-triangle-exclamation' : 'fa-circle-info';
            
            toast.className = `toast ${bg} text-white px-5 py-4 rounded-2xl shadow-[0_10px_20px_rgba(0,0,0,0.2)] border border-white/20 flex items-center gap-3 font-bold text-sm`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-lg"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(120%)';
                toast.style.transition = 'all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // === 6. الواتساب والطباعة ===
        function getReportData() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const total = appData.employees.length;
            const leaves = appData.employees.filter(e => e.status === "إجازة" || e.status === "غياب").length;
            const active = total - leaves;
            const notes = document.getElementById('dailyNotes').value || "لا توجد حوادث أمنية هامة. الوضع مستقر.";
            
            return { dateStr, total, active, leaves, notes, employees: appData.employees, leader: appData.currentLeader, dutyOfficer: appData.dutyOfficer, platoon: appData.platoonName };
        }

        function sendViaWhatsApp() {
            const data = getReportData();
            
            let text = `🛡️ *تقرير البلاغ اليومي - أمن المتحف*\n`;
            text += `📅 *التاريخ:* ${data.dateStr}\n`;
            if(data.platoon) text += `🔰 *الفصيل:* ${data.platoon}\n`;
            if(data.dutyOfficer) text += `⭐ *الضابط المناوب:* ${data.dutyOfficer}\n`;
            text += `👮‍♂️ *رئيس النوبة:* ${data.leader || 'غير محدد'}\n`;
            text += `\n📊 *الملخص:* الكلي (${data.total}) | 🟢 متواجد (${data.active}) | 🔴 إجازة (${data.leaves})\n`;
            text += `\n📋 *جدول التوزيع:*\n`;
            
            let onDuty = data.employees.filter(e => e.status !== "إجازة" && e.status !== "غياب" && e.status !== "غير معين");
            let notAssigned = data.employees.filter(e => e.status === "غير معين");
            let offDuty = data.employees.filter(e => e.status === "إجازة" || e.status === "غياب");

            if(onDuty.length > 0) {
                text += `\n📍 *في المواقع:*\n`;
                onDuty.forEach(e => { text += `▪️ ${e.name} : ${e.status}\n`; });
            }
            if(notAssigned.length > 0) {
                text += `\n⏳ *احتياط/موجود:*\n`;
                notAssigned.forEach(e => { text += `▪️ ${e.name}\n`; });
            }
            if(offDuty.length > 0) {
                text += `\n🌴 *الإجازات والغياب:*\n`;
                offDuty.forEach(e => { text += `▪️ ${e.name} : ${e.status}\n`; });
            }

            text += `\n🚨 *الملاحظات والأحداث:*\n${data.notes}\n`;

            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        function generateReport() {
            const data = getReportData();
            let dutyDistribution = "";
            
            data.employees.forEach(emp => {
                let badgeStyle = "padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1;";
                if(emp.status === "إجازة") badgeStyle = "padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; background: #fff1f2; color: #be123c; border: 1px solid #fecdd3;";
                else if(emp.status === "غياب") badgeStyle = "padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; background: #ef4444; color: white; border: 1px solid #dc2626;";
                else if(emp.status !== "غير معين") badgeStyle = "padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0;";

                dutyDistribution += `
                    <tr>
                        <td style="padding: 15px; border-bottom: 1px solid #e2e8f0; font-weight: bold; color: #1e293b;">${emp.name}</td>
                        <td style="padding: 15px; border-bottom: 1px solid #e2e8f0; text-align: center;"><span style="${badgeStyle}">${emp.status}</span></td>
                    </tr>
                `;
            });

            const printArea = document.getElementById('printSection');
            printArea.innerHTML = `
                <div style="direction: rtl; text-align: right; font-family: 'Tajawal', Arial, sans-serif; max-width: 210mm; min-height: 297mm; margin: 0 auto; background: white; padding: 40px; box-sizing: border-box;">
                    
                    <!-- ترويسة التقرير الرسمية -->
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #1e293b; padding-bottom: 20px; margin-bottom: 30px;">
                        <div>
                            <h1 style="margin: 0; font-size: 28px; color: #0f172a; font-weight: 900;">تقرير البلاغ اليومي للأمن</h1>
                            <p style="margin: 5px 0 0 0; color: #64748b; font-size: 14px;">نظام أمن المتحف - إدارة العمليات</p>
                        </div>
                        <div style="text-align: left; font-size: 14px;">
                            <p style="margin: 0;"><strong>التاريخ:</strong> ${data.dateStr}</p>
                            <p style="margin: 5px 0 0 0;"><strong>وقت الطباعة:</strong> ${new Date().toLocaleTimeString('ar-SA')}</p>
                        </div>
                    </div>

                    <!-- معلومات القيادة -->
                    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                        <div style="flex: 1; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
                            <h3 style="margin: 0 0 15px 0; color: #0f172a; border-bottom: 2px solid #cbd5e1; padding-bottom: 5px; font-size: 16px;">القيادة والإشراف</h3>
                            <p style="margin: 0 0 8px 0; font-size: 15px;"><strong>الفصيل:</strong> ${data.platoon || 'غير محدد'}</p>
                            <p style="margin: 0 0 8px 0; font-size: 15px;"><strong>الضابط المناوب:</strong> ${data.dutyOfficer || 'غير محدد'}</p>
                            <p style="margin: 0; font-size: 15px;"><strong>رئيس النوبة:</strong> ${data.leader || 'غير محدد'}</p>
                        </div>
                        <div style="flex: 1; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
                            <h3 style="margin: 0 0 15px 0; color: #0f172a; border-bottom: 2px solid #cbd5e1; padding-bottom: 5px; font-size: 16px;">ملخص القوة</h3>
                            <p style="margin: 0 0 8px 0; font-size: 15px;"><strong>القوة الإجمالية:</strong> ${data.total} أفراد</p>
                            <p style="margin: 0 0 8px 0; font-size: 15px; color: #047857;"><strong>المداومين الفعليين:</strong> ${data.active} أفراد</p>
                            <p style="margin: 0; font-size: 15px; color: #be123c;"><strong>الإجازات والغياب:</strong> ${data.leaves} أفراد</p>
                        </div>
                    </div>

                    <!-- جدول التوزيع -->
                    <h3 style="color: #0f172a; margin-bottom: 15px; font-size: 18px;">📋 جدول توزيع القوة على المواقع</h3>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;">
                        <thead>
                            <tr style="background-color: #1e293b; color: white;">
                                <th style="padding: 15px; text-align: right; font-weight: bold; width: 50%;">الاسم</th>
                                <th style="padding: 15px; text-align: center; font-weight: bold; width: 50%;">الموقع المستلم / الحالة</th>
                            </tr>
                        </thead>
                        <tbody>${dutyDistribution}</tbody>
                    </table>

                    <!-- الأحداث والملاحظات -->
                    <h3 style="color: #0f172a; margin-bottom: 15px; font-size: 18px;">🚨 الأحداث الأمنية والملاحظات العامة</h3>
                    <div style="border: 1px solid #cbd5e1; padding: 25px; background: #f8fafc; border-radius: 12px; min-height: 150px; white-space: pre-line; line-height: 1.8; font-size: 15px; color: #1e293b;">${data.notes}</div>

                    <!-- التواقيع -->
                    <div style="margin-top: 80px; display: flex; justify-content: space-around; align-items: flex-end;">
                        <div style="text-align: center;">
                            <p style="margin-bottom: 40px; font-weight: bold; color: #334155;">رئيس النوبة</p>
                            <p style="border-top: 1px dashed #94a3b8; padding-top: 10px; width: 200px;">الاسم والتوقيع</p>
                        </div>
                        <div style="text-align: center;">
                            <p style="margin-bottom: 40px; font-weight: bold; color: #334155;">الضابط المناوب</p>
                            <p style="border-top: 1px dashed #94a3b8; padding-top: 10px; width: 200px;">الاسم والتوقيع</p>
                        </div>
                    </div>

                    <button onclick="window.location.reload()" style="margin-top: 60px; background: #1e293b; color: #fff; padding: 12px 25px; border: none; cursor: pointer; border-radius: 8px; font-family: inherit; font-size: 16px; font-weight: bold;" class="no-print">⬅️ إنهاء الطباعة والعودة</button>
                </div>
            `;

            printArea.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            setTimeout(() => { window.print(); }, 300);
        }

        // تشغيل التهيئة
        autoUpdateStatuses();
        renderSystem();
    </script>
</body>
</html>
